name: Deploy gcal-atimelogger worker

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "src/gcal-atimelogger-worker.js"
      - "wrangler.gcal-atimelogger.jsonc"
      - ".github/workflows/deploy-gcal-atimelogger.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy -c wrangler.gcal-atimelogger.jsonc
        env:
          CLOUDFLARE_API_TOKEN: $ secrets.CLOUDFLARE_API_TOKEN 
          CLOUDFLARE_ACCOUNT_ID: $ secrets.CLOUDFLARE_ACCOUNT_ID 
